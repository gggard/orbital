site_name: Orbital
site_url: https://gggard.github.io/orbital/
site_description: >-
  Self-hosted platform for deploying, running, and managing Streamlit apps
  and static sites on Kubernetes.
site_author: Orbital contributors
repo_url: https://github.com/gggard/orbital
repo_name: gggard/orbital
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site
use_directory_urls: true

hooks:
  - hooks.py

theme:
  name: material
  favicon: images/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

nav:
  - Install: INSTALL.md
  - User Guide: USER.md
  - Admin: ADMIN.md
  - API: API.md
  - UI Spec: UI-SPEC.md
  - Development: DEVELOPMENT.md
  - Contributing: CONTRIBUTING.md
  - Specification: SPEC.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - include-markdown
  - llmstxt:
      markdown_description: >-
        Orbital is a self-hosted platform for deploying, running, and
        managing Streamlit apps — and plain static sites — on Kubernetes.
        Point it at a git repository and the app is live on its own
        subdomain minutes later.
      full_output: llms-full.txt
      sections:
        Guides:
          - INSTALL.md: Install the Helm chart on a real Kubernetes cluster.
          - USER.md: Deploy and manage your own apps as an Orbital user.
          - ADMIN.md: Operate the platform — roles, RBAC, upgrades.
          - DEVELOPMENT.md: Contribute to Orbital — local dev on minikube.
        Reference:
          - API.md: Deploy and monitor apps via the REST API.
          - UI-SPEC.md: UI specification for the management console.
          - SPEC.md: Full functional specification and architecture.
          - CONTRIBUTING.md: PR and issue workflow.

# These docs are written to be read both on GitHub (root-relative links like
# ../SPEC.md, ../.github/workflows/ci.yml) and built into this site; such
# links fall outside docs_dir so MkDocs can't resolve them, but they're
# intentional and correct on GitHub, so don't fail --strict builds over them.
validation:
  links:
    not_found: info
