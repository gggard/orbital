# Configures GitHub's auto-generated release notes, used by the
# `generate_release_notes: true` step in .github/workflows/release.yml.
# Categorizes merged PRs by label into the changelog for each release.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
      - onhold
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 📝 Documentation
      labels:
        - documentation
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 🧹 Other Changes
      labels:
        - "*"
