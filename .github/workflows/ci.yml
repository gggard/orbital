name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: make install

      - name: Run tests
        run: make test

      - name: Report coverage
        if: always()
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          .venv/bin/coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm run coverage

      - name: Report coverage
        if: always()
        run: |
          echo '## UI Coverage' >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const row = (name, m) => \`| \${name} | \${m.pct}% (\${m.covered}/\${m.total}) |\`;
            console.log(['| Metric | Coverage |', '|---|---|',
              row('Lines', s.lines), row('Statements', s.statements),
              row('Functions', s.functions), row('Branches', s.branches)].join('\n'));
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui-lcov
          path: ui/coverage/lcov.info

  sonar:
    needs: [test-python, build-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Python coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Download UI coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-ui-lcov
          path: ui/coverage

      - name: SonarQube Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
