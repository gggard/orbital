{{- if .Values.apps.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.apps.namespace }}
  labels: {{- include "sh.labels" . | nindent 4 }}
{{- end }}
{{- if .Values.builds.createNamespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.builds.namespace }}
  labels: {{- include "sh.labels" . | nindent 4 }}
{{- end }}
