{{- if .Values.console.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orbital.consoleName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: console
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: console
        {{- include "orbital.labels" . | nindent 8 }}
    spec:
      containers:
        - name: console
          image: "{{ .Values.image.console.repository }}:{{ .Values.image.console.tag }}"
          imagePullPolicy: {{ .Values.image.console.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: CONTROL_PLANE_URL
              value: "http://{{ include "orbital.controlPlaneName" . }}:8000"
          readinessProbe:
            httpGet: {path: /, port: 3000}
            initialDelaySeconds: 3
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orbital.consoleName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: console
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 3000
      targetPort: 3000
{{- end }}
