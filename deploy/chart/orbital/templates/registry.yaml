{{- if .Values.registry.internal.enabled }}
# Dev/demo in-cluster registry. NOT for production use (no auth, no GC policy).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "orbital.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.registry.internal.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orbital.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: registry
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: registry
        {{- include "orbital.labels" . | nindent 8 }}
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "orbital.fullname" . }}-registry
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orbital.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: registry
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 5000
      targetPort: 5000
{{- end }}
