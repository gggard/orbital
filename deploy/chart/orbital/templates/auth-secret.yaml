{{- if and .Values.auth.console.enabled (not .Values.auth.console.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orbital.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
stringData:
  oidc-client-secret: {{ required "auth.console.clientSecret (or existingSecret) is required when console auth is enabled" .Values.auth.console.clientSecret | quote }}
  session-secret: {{ .Values.auth.console.sessionSecret | default (randAlphaNum 48) | quote }}
{{- end }}
