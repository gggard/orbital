{{- if not .Values.database.url }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "orbital.controlPlaneName" . }}-data
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.database.persistence.size }}
  {{- with .Values.database.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orbital.controlPlaneName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  replicas: {{ if .Values.database.url }}{{ .Values.controlPlane.replicas }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: control-plane
        {{- include "orbital.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "orbital.controlPlaneName" . }}
      containers:
        - name: control-plane
          image: "{{ .Values.image.controlPlane.repository }}:{{ .Values.image.controlPlane.tag }}"
          imagePullPolicy: {{ .Values.image.controlPlane.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: ORBITAL_DATABASE_URL
              value: {{ .Values.database.url | default "sqlite:////data/orbital.db" | quote }}
            - name: ORBITAL_APPS_NAMESPACE
              value: {{ .Values.apps.namespace | quote }}
            - name: ORBITAL_BUILDS_NAMESPACE
              value: {{ .Values.builds.namespace | quote }}
            - name: ORBITAL_ROUTING_MODE
              value: {{ .Values.apps.routing | quote }}
            - name: ORBITAL_APPS_PATH_PREFIX
              value: {{ .Values.apps.pathPrefix | quote }}
            - name: ORBITAL_APPS_DOMAIN
              value: {{ .Values.apps.domain | quote }}
            - name: ORBITAL_APPS_URL_PORT
              value: {{ .Values.apps.urlPort | quote }}
            - name: ORBITAL_INGRESS_CLASS
              value: {{ .Values.ingress.className | quote }}
            - name: ORBITAL_REGISTRY_PUSH_URL
              value: {{ .Values.registry.pushUrl | quote }}
            - name: ORBITAL_REGISTRY_PULL_PREFIX
              value: {{ .Values.registry.pullPrefix | quote }}
            - name: ORBITAL_PYTHON_VERSIONS
              value: {{ include "orbital.pythonVersionsJson" . | quote }}
            - name: ORBITAL_STATIC_BASE_IMAGE
              value: {{ .Values.baseImages.staticTag | quote }}
            - name: ORBITAL_BUILDKIT_ROOTLESS
              value: {{ .Values.builds.rootless | quote }}
            - name: ORBITAL_BUILD_TIMEOUT_SECONDS
              value: {{ .Values.builds.timeoutSeconds | quote }}
            - name: ORBITAL_RECONCILE_INTERVAL
              value: {{ .Values.controlPlane.reconcileInterval | quote }}
            - name: ORBITAL_APP_CPU_REQUEST
              value: {{ .Values.apps.resources.cpuRequest | quote }}
            - name: ORBITAL_APP_CPU_LIMIT
              value: {{ .Values.apps.resources.cpuLimit | quote }}
            - name: ORBITAL_APP_MEM_REQUEST
              value: {{ .Values.apps.resources.memRequest | quote }}
            - name: ORBITAL_APP_MEM_LIMIT
              value: {{ .Values.apps.resources.memLimit | quote }}
            - name: ORBITAL_UI_BASE_URL
              value: {{ .Values.console.url | quote }}
            - name: ORBITAL_HIBERNATION_ENABLED
              value: {{ .Values.hibernation.enabled | quote }}
            - name: ORBITAL_HIBERNATION_TIMEOUT_SECONDS
              value: {{ mul .Values.hibernation.timeoutHours 3600 | quote }}
            - name: ORBITAL_HIBERNATION_MAX_TIMEOUT_SECONDS
              value: {{ mul .Values.hibernation.maxTimeoutHours 3600 | quote }}
            - name: ORBITAL_GIT_POLL_DEFAULT_INTERVAL_SECONDS
              value: {{ mul .Values.gitPoll.defaultIntervalMinutes 60 | quote }}
            - name: ORBITAL_GIT_POLL_MIN_INTERVAL_SECONDS
              value: {{ mul .Values.gitPoll.minIntervalMinutes 60 | quote }}
            - name: ORBITAL_CONTROL_PLANE_SERVICE_HOST
              value: "{{ include "orbital.controlPlaneName" . }}.{{ .Release.Namespace }}.svc.cluster.local"
            - name: ORBITAL_CONTROL_PLANE_SERVICE_PORT
              value: "8000"
            {{- if .Values.auth.console.enabled }}
            - name: ORBITAL_UI_AUTH_ENABLED
              value: "true"
            - name: ORBITAL_OIDC_ISSUER_URL
              value: {{ .Values.auth.console.issuerUrl | quote }}
            - name: ORBITAL_OIDC_CLIENT_ID
              value: {{ .Values.auth.console.clientId | quote }}
            - name: ORBITAL_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "orbital.authSecretName" . }}
                  key: oidc-client-secret
            - name: ORBITAL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "orbital.authSecretName" . }}
                  key: session-secret
            - name: ORBITAL_ADMIN_GROUPS
              value: {{ .Values.auth.console.adminGroups | toJson | quote }}
            - name: ORBITAL_CREATOR_GROUPS
              value: {{ .Values.auth.console.creatorGroups | toJson | quote }}
            - name: ORBITAL_VIEWER_GROUPS
              value: {{ .Values.auth.console.viewerGroups | toJson | quote }}
            - name: ORBITAL_PUBLIC_SHARING_GROUPS
              value: {{ .Values.auth.console.publicSharingGroups | toJson | quote }}
            - name: ORBITAL_KNOWN_GROUPS
              value: {{ .Values.auth.console.knownGroups | toJson | quote }}
            - name: ORBITAL_GROUPS_FROM_KEYCLOAK
              value: {{ .Values.auth.console.groupsFromKeycloak | quote }}
            {{- end }}
            {{- if .Values.auth.viewer.enabled }}
            - name: ORBITAL_AUTH_ENABLED
              value: "true"
            - name: ORBITAL_OAUTH2_PROXY_AUTH_URL
              value: {{ .Values.auth.viewer.oauth2ProxyAuthUrl | quote }}
            - name: ORBITAL_AUTHZ_BASE_URL
              value: "http://{{ include "orbital.controlPlaneName" . }}.{{ .Release.Namespace }}.svc:8000"
            {{- end }}
          readinessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 15
          resources: {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          {{- if not .Values.database.url }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if not .Values.database.url }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "orbital.controlPlaneName" . }}-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orbital.controlPlaneName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8000
      targetPort: 8000
