apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orbital.controlPlaneName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
---
# app runtime objects
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "orbital.fullname" . }}-apps
  namespace: {{ .Values.apps.namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [services, secrets, configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]
  # per-app CPU/memory usage (requires metrics-server; absent = feature off)
  - apiGroups: [metrics.k8s.io]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "orbital.fullname" . }}-apps
  namespace: {{ .Values.apps.namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "orbital.fullname" . }}-apps
subjects:
  - kind: ServiceAccount
    name: {{ include "orbital.controlPlaneName" . }}
    namespace: {{ .Release.Namespace }}
---
# build jobs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "orbital.fullname" . }}-builds
  namespace: {{ .Values.builds.namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
rules:
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, create, update, patch]
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "orbital.fullname" . }}-builds
  namespace: {{ .Values.builds.namespace }}
  labels: {{- include "orbital.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "orbital.fullname" . }}-builds
subjects:
  - kind: ServiceAccount
    name: {{ include "orbital.controlPlaneName" . }}
    namespace: {{ .Release.Namespace }}
